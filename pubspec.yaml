name: pictogram
description: "PictoGram - photo sharing social app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  # Firebase - Pinned critical versions for production stability
  firebase_core: 3.15.2
  firebase_auth: 5.7.0
  cloud_firestore: 5.6.12
  firebase_storage: 12.4.10
  firebase_app_check: 0.3.2+10
  firebase_messaging: 15.2.10
  firebase_crashlytics: 4.3.10
  firebase_analytics: ^11.6.0
  cloud_functions: 5.6.2
  # State + Navigation
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  # Media
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  cached_network_image: ^3.4.1
  emoji_picker_flutter: ^4.4.0
  # UI
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  font_awesome_flutter: ^10.7.0
  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  share_plus: ^10.1.2
  # Device + Network
  permission_handler: ^11.4.0
  path_provider: ^2.1.5
  connectivity_plus: ^5.0.2
  app_settings: ^5.1.1
  # Biometric Authentication
  local_auth: ^2.3.0
  # Google Sign-In
  google_sign_in: ^6.2.1
  # Future-proof API flexibility
  http: ^1.2.0
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/adaptive_icon.png"