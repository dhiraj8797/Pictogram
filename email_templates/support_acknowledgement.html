<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>We received your request</title>
</head>
<body style="margin:0;padding:0;background:#0a0a12;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:32px 16px;background:#0a0a12;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:580px;background:#111322;border:1px solid #2a2d4d;border-radius:24px;overflow:hidden;">
          <tr>
            <td style="padding:30px 30px 18px;background:linear-gradient(135deg,#7c3aed 0%,#9333ea 50%,#111322 100%);">
              <h1 style="margin:0;color:#ffffff;font-size:28px;line-height:1.2;">We've received your request</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:30px;">
              <p style="margin:0 0 14px;color:#ffffff;font-size:16px;">Hi {{userName}},</p>
              <p style="margin:0 0 18px;color:#cbd5e1;font-size:15px;line-height:1.9;">Thanks for contacting Pictogram Support. Your request has been received and our team will review it soon.</p>
              <div style="padding:16px 18px;background:#0b0d1a;border:1px solid #31355f;border-radius:18px;">
                <p style="margin:0;color:#cbd5e1;font-size:14px;line-height:1.8;">Ticket ID: <strong style="color:#ffffff;">{{ticketId}}</strong><br>Subject: {{ticketSubject}}</p>
              </div>
              <p style="margin:18px 0 0;color:#94a3b8;font-size:13px;line-height:1.8;">For urgent issues, reply directly to this email.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:22px 30px 34px;border-top:1px solid #222445;color:#94a3b8;font-size:12px;line-height:1.8;">
              Pictogram Support<br>
              <a href="mailto:support@pictogram.online" style="color:#c4b5fd;text-decoration:none;">support@pictogram.online</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
